# HBA for the TLS-required test fixture (milestone 6 exit tests): TCP
# connections are only accepted over TLS -- a plaintext client is refused at
# the protocol level, which is what "TLS-required managed Postgres" means in
# roadmap-v1.md. `local` stays enabled for the image's own pg_isready
# healthcheck. Trust auth for the same reason as docker-compose.yml: this is
# a throwaway fixture, never reachable beyond the developer machine / CI job.
local   all all           trust
hostssl all all 0.0.0.0/0 trust
hostssl all all ::0/0     trust
