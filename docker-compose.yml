services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pggql
      POSTGRES_PASSWORD: pggql
      POSTGRES_DB: pggql
      # Test fixture only — trust auth is fine here since this container is not
      # reachable outside the developer's machine. Real connections use SCRAM;
      # see docs/decisions/0002-scram-auth-not-md5.md.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55432:5432"
    volumes:
      - ./test/fixtures:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pggql -d pggql"]
      interval: 2s
      timeout: 2s
      retries: 15
