# CI (roadmap-v1.md milestone 5): unit tests on both platforms, plus the
# Postgres-backed integration suite against a service container that mirrors
# docker-compose.yml's fixture (same credentials, trust auth, port, seed).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: build + unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install libpq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: brew install libpq

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test

  smoke-fuzz:
    name: smoke fuzz (bounded coverage-guided run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      # A bounded run of the coverage-guided fuzz targets (GraphQL parser,
      # NDC request decoders). 200K iterations keeps this to roughly a
      # minute of fuzzing; the sustained long runs stay local per
      # roadmap-v1.md milestone 5. -Dfuzz forces the LLVM backend: the
      # self-hosted x86_64 backend miscompiles fuzz coverage instrumentation
      # ("corrupted coverage file: pcs_len was zero" -- codeberg
      # ziglang/zig#30655; see build.zig).
      - name: Smoke fuzz
        run: zig build test --fuzz=200K -Dfuzz

  integration:
    name: Postgres integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pggql
          POSTGRES_PASSWORD: pggql
          POSTGRES_DB: pggql
          # Mirrors docker-compose.yml: the integration tests connect without
          # a password (trust is fine for a CI-local throwaway container).
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U pggql -d pggql"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install libpq and psql
        run: sudo apt-get update && sudo apt-get install -y libpq-dev postgresql-client

      # docker-compose.yml seeds via an initdb volume mount; service
      # containers can't mount checkout files, so seed explicitly instead.
      - name: Seed fixture schema
        run: psql "postgres://pggql@localhost:55432/pggql" -f test/fixtures/seed.sql

      - name: Integration tests
        run: zig build test-integration

  # Milestone 6 TLS exit tests, per docs/roadmap-v1.md: the whole integration
  # suite against (a) a TLS-required Postgres negotiating TLS 1.3 and (b) the
  # same server pinned to TLS 1.2 (the RDS/Azure scenario that motivated
  # adopting libpq, ADR 0016). No service container and no external infra:
  # the runner image's own PostgreSQL is configured with throwaway certs from
  # test/tls/gen-certs.sh and an hostssl-only pg_hba, so a plaintext client
  # is refused at the protocol level (asserted below), and tls_test.zig
  # asserts the negotiated protocol version from pg_stat_ssl server-side.
  tls-integration:
    name: TLS integration (${{ matrix.expect }}${{ matrix.pin && ', pinned' || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pin: "", expect: "TLSv1.3" }
          - { pin: "TLSv1.2", expect: "TLSv1.2" }
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install libpq and psql
        run: sudo apt-get update && sudo apt-get install -y libpq-dev postgresql-client

      - name: Generate fixture certs
        run: ./test/tls/gen-certs.sh

      - name: Configure the runner's Postgres for TLS and start it
        run: |
          PGVER=$(ls /etc/postgresql | sort -n | tail -1)
          PGCONF="/etc/postgresql/$PGVER/main"
          echo "using PostgreSQL $PGVER at $PGCONF"

          sudo install -o postgres -g postgres -m 0644 test/tls/generated/server.crt /var/lib/postgresql/server.crt
          sudo install -o postgres -g postgres -m 0600 test/tls/generated/server.key /var/lib/postgresql/server.key
          sudo cp test/tls/pg_hba.tls.conf "$PGCONF/pg_hba.conf"

          {
            echo "ssl = on"
            echo "ssl_cert_file = '/var/lib/postgresql/server.crt'"
            echo "ssl_key_file = '/var/lib/postgresql/server.key'"
            if [ -n "${{ matrix.pin }}" ]; then
              echo "ssl_max_protocol_version = '${{ matrix.pin }}'"
            fi
          } | sudo tee -a "$PGCONF/postgresql.conf"

          sudo systemctl restart postgresql
          timeout 30 bash -c 'until pg_isready -q; do sleep 1; done'

      - name: Create role and seed fixture schema over TLS
        run: |
          sudo -u postgres psql -c "CREATE ROLE pggql LOGIN SUPERUSER"
          sudo -u postgres createdb -O pggql pggql
          psql "postgres://pggql@localhost:5432/pggql?sslmode=verify-full&sslrootcert=$PWD/test/tls/generated/ca.crt" \
            -f test/fixtures/seed.sql

      - name: Assert plaintext connections are refused
        run: |
          if psql "postgres://pggql@localhost:5432/pggql?sslmode=disable" -c "SELECT 1"; then
            echo "server accepted a plaintext connection -- hostssl-only HBA is not in effect"
            exit 1
          fi

      - name: Integration tests over TLS
        env:
          PGGQL_TEST_HOST: localhost
          PGGQL_TEST_PORT: "5432"
          PGGQL_TEST_SSLMODE: verify-full
          PGGQL_TEST_SSLROOTCERT: ${{ github.workspace }}/test/tls/generated/ca.crt
          PGGQL_TEST_EXPECT_TLS_VERSION: ${{ matrix.expect }}
        run: zig build test-integration
